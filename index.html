<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/src/assets/TN LOGO.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TN Universities Connect</title>
    <meta
      name="description"
      content="TN Universities Connect unites students, alumni and institutions across Ghana — a platform to learn, network and grow."
    />
    <meta name="author" content="TN Universities Connect" />
    <meta property="og:title" content="TN Universities Connect" />
    <meta
      property="og:description"
      content="Guide. Work. Inspire. — connecting Ghana's universities."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/src/assets/TN LOGO.jpeg" />
    <meta name="twitter:card" content="summary_large_image" />
  </head>
  <body>
    <div id="root">
      <!-- Static preloader displayed before React mounts -->
      <div style="position: fixed; inset: 0; display: grid; place-items: center; background-color: white; z-index: 9999;">
        <div style="position: relative; width: 176px; height: 176px; display: grid; place-items: center;">
          <!-- Ghana flag stripe spinning ring -->
          <div style="position: absolute; inset: -24px; border-radius: 9999px; background: linear-gradient(135deg, #D71920 0%, #F5C518 50%, #006B2D 100%); opacity: 0.9; filter: blur(2px); animation: preloaderSpin 6s linear infinite;"></div>
          <div style="position: absolute; inset: -8px; border-radius: 9999px; background-color: white;"></div>
          <img src="/src/assets/TN LOGO.jpeg" style="position: relative; height: 144px; width: 144px; border-radius: 9999px; object-fit: contain; animation: logoPulse 1.6s ease-in-out infinite; box-shadow: 0 4px 10px rgba(0,0,0,0.05);" alt="Loading..." />
        </div>
      </div>
      <style>
        @keyframes preloaderSpin { 100% { transform: rotate(360deg); } }
        @keyframes logoPulse { 0%, 100% { transform: scale(1); filter: drop-shadow(0 6px 18px rgba(0,0,0,0.12)); } 50% { transform: scale(1.06); filter: drop-shadow(0 10px 28px rgba(0,0,0,0.18)); } }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
